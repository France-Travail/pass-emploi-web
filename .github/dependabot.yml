version: 2

updates:
  # ===========================================
  # NPM Dependencies
  # ===========================================
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      time: '07:00'
      timezone: Europe/Paris
    open-pull-requests-limit: 15
    commit-message:
      prefix: 'chore(deps):'
    groups:
      # Écosystèmes (prioritaires, couvrent tous les update-types)
      next:
        applies-to: version-updates
        patterns:
          - "next"
          - "next-*"
          - "@next/*"
          - "eslint-config-next"
      eslint:
        applies-to: version-updates
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "@typescript-eslint/*"
      react:
        applies-to: version-updates
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      testing:
        applies-to: version-updates
        patterns:
          - "jest*"
          - "@testing-library/*"
          - "@types/jest*"
      elastic-apm:
        applies-to: version-updates
        patterns:
          - "@elastic/*"
          - "elastic-apm-*"
      tailwind-css:
        applies-to: version-updates
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "postcss"

      # Production dependencies - patch and minor (auto-merge côté CI)
      prod-minor-patch:
        applies-to: version-updates
        dependency-type: production
        update-types:
          - patch
          - minor
      # Development dependencies - patch and minor (auto-merge côté CI)
      dev-minor-patch:
        applies-to: version-updates
        dependency-type: development
        update-types:
          - patch
          - minor
      # Majors hors écosystèmes : chaque dépendance a sa propre PR

  # ===========================================
  # GitHub Actions
  # ===========================================
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: '07:00'
      timezone: Europe/Paris
    commit-message:
      prefix: 'ci(deps):'
    groups:
      # GitHub Actions - patch and minor (auto-merge côté CI)
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - patch
          - minor
      # Majors : pas de groupe, chaque action a sa propre PR