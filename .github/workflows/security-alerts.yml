name: Security Alerts

on:
  schedule:
    - cron: '0 */3 * * *' # Toutes les 3 heures

jobs:
  security-alerts:
    uses: France-Travail/pass-emploi-tools/.github/workflows/security-alerts.yml@964c4aad57b98bc51c4312559bf56a59f16bc66f
    with:
      repo-name: 'pass-emploi-web'
    secrets:
      DEPENDABOT_ALERTS_READER: ${{ secrets.DEPENDABOT_ALERTS_READER }}
      MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
